name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Lint: ruff (style, bugbear, no-print enforcement)
  # -----------------------------------------------------------------------
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src tests scripts

  # -----------------------------------------------------------------------
  # Guard: never allow personal media files to be committed
  # -----------------------------------------------------------------------
  no-committed-media:
    name: Block committed media
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for tracked media under assets/
        run: |
          MATCHES=$(git ls-files 'assets/**/*.jpg' 'assets/**/*.jpeg' 'assets/**/*.png' 'assets/**/*.webp' 'assets/**/*.heic' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::检测到 assets/ 下存在被追踪的图片文件，禁止提交个人媒体数据："
            echo "$MATCHES"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Backend: Python Lint & Tests
  # -----------------------------------------------------------------------
  backend-test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core deps (skip heavy ML packages for CI)
          pip install fastapi uvicorn pydantic pillow
          pip install numpy scikit-learn
          # Install test deps
          pip install -r requirements-dev.txt

      - name: Run unit tests
        working-directory: .
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -v --tb=short -x

  # -----------------------------------------------------------------------
  # Frontend: Build Verification
  # -----------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 7
